server { listen 80; server_name _; root /usr/share/nginx/html; index index.html; add_header X-Content-Type-Options nosniff always; add_header X-Frame-Options DENY always; location /api/ { proxy_pass http://backend:8080; proxy_http_version 1.1; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; } location = /index.html { add_header Cache-Control "no-cache"; } location / { try_files $uri $uri/ /index.html; } }
